services:
  - type: web
    name: stock-dashboard-api
    runtime: python
    pythonVersion: 3.14
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://jarnox-stock-dashboard.vercel.app,http://localhost:5500,http://127.0.0.1:5500
      - key: PYTHON_VERSION
        value: 3.14
